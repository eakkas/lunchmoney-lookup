<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LunchMoney Lookup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      background: #fff;
    }
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 16px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .hint { font-size: 12px; color: #666; line-height: 1.5; }
    .hint strong { color: #1a1a2e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>LunchMoney Lookup</h1>
    <p>Transaction research tool</p>
  </div>
  <div class="body">
    <p class="hint">
      Hover over any transaction on <strong>my.lunchmoney.app</strong> and click the <strong>🔍</strong> button to open the lookup sidebar.
    </p>
    <p class="hint">
      From the sidebar you can search <strong>Google</strong> by merchant name or open <strong>Gmail</strong> filtered by amount.
    </p>
  </div>
</body>
</html>
